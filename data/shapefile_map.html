  // ── Legend ────────────────────────────────────────────────────────────────
  function updateLegend(col) {
    var panel = document.getElementById('custom-legend');
    if (!panel) return;
    var cfg = COL_CONFIGS[col];
    if (!cfg || cfg.type === 'none') { panel.style.display = 'none'; return; }
    panel.style.display = 'block';

    if (cfg.type === 'numeric') {
      var gradStops = VIRIDIS.slice().reverse().join(',');
      panel.innerHTML =
        '<div style="font-size:0.78em;font-weight:700;color:#333;margin-bottom:6px;word-break:break-word">' + col + '</div>' +
        '<div style="display:flex;align-items:stretch;gap:6px">' +
          '<div style="width:16px;min-height:110px;border-radius:3px;flex-shrink:0;' +
               'background:linear-gradient(to bottom,' + gradStops + ')"></div>' +
          '<div style="display:flex;flex-direction:column;justify-content:space-between;font-size:0.72em;color:#555">' +
            '<span>' + cfg.vmax.toLocaleString() + '</span>' +
            '<span>' + cfg.vmin.toLocaleString() + '</span>' +
          '</div>' +
        '</div>';
    } else {
      var items = Object.keys(cfg.map).map(function(k) {
        return '<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">' +
          '<span style="width:12px;height:12px;border-radius:2px;flex-shrink:0;display:inline-block;background:' + cfg.map[k] + '"></span>' +
          '<span style="font-size:0.75em;color:#333;word-break:break-all">' + k + '</span></div>';
      }).join('');
      panel.innerHTML =
        '<div style="font-size:0.78em;font-weight:700;color:#333;margin-bottom:6px;word-break:break-word">' + col + '</div>' +
        items;
    }
  }

  // ── Choropleth switcher ────────────────────────────────────────────────────
  window.switchChoroplethCol = function(col) {
    var map = window["map_bd5dde11f75efca6beed5a9f3b436b52"];
    if (!map) return;
    map.eachLayer(function(layer) {
      if (typeof layer.eachLayer !== 'function') return;
      layer.eachLayer(function(featureLayer) {
        if (!featureLayer.feature) return;
        var val = featureLayer.feature.properties[col];
        featureLayer.setStyle({ fillColor: getColor(col, val) });
      });
    });
    updateLegend(col);
  };

  // ── Left-side info panel ───────────────────────────────────────────────────
  var _currentProps = null;  // properties of the last clicked feature

  function updateInfoPanel() {
    if (!_currentProps) return;
    var rows = DATA_COLS.map(function(f, idx) {
      var v       = _currentProps[f];
      var visible = visibleFields[f] !== false;
      return '<tr style="' + (visible ? '' : 'display:none') + '">' +
        '<th style="padding:4px 6px 4px 10px;text-align:left;white-space:nowrap;' +
                   'font-weight:normal;border-bottom:1px solid #f0f0f0;vertical-align:middle">' +
          '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin:0">' +
            '<input type="checkbox" ' + (visible ? 'checked' : '') +
            ' data-idx="' + idx + '" style="cursor:pointer;flex-shrink:0">' +
            '<span style="color:#555;font-weight:600">' + f + '</span>' +
          '</label>' +
        '</th>' +
        '<td style="padding:4px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle">' +
          (v != null ? v : '—') +
        '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('info-content').innerHTML =
      '<table style="border-collapse:collapse;font-size:0.85em;width:100%">' + rows + '</table>';
    // Attach listeners after innerHTML update — avoids inline onchange quote-escaping issues
    document.querySelectorAll('#info-content input[type=checkbox]').forEach(function(cb) {
      cb.addEventListener('change', function() {
        toggleField(DATA_COLS[parseInt(this.dataset.idx)], this.checked);
      });
    });
    document.getElementById('info-panel').style.display = 'flex';
  }

  window.closeInfoPanel = function() {
    document.getElementById('info-panel').style.display = 'none';
  };

  window.toggleField = function(col, checked) {
    visibleFields[col] = checked;
    updateInfoPanel();
  };

  window.setAllFields = function(checked) {
    DATA_COLS.forEach(function(c) { visibleFields[c] = checked; });
    updateInfoPanel();
  };

  // Attach click handlers to every GeoJSON feature layer
  function init() {
    var map = window["map_bd5dde11f75efca6beed5a9f3b436b52"];
    // Guard: window[id] can return the DOM div element before the L.Map is assigned.
    // Retry until we have the actual Leaflet map object (which has eachLayer).
    if (!map || typeof map.eachLayer !== 'function') { setTimeout(init, 50); return; }
    // Hide the static branca legend and replace with our dynamic one
    document.querySelectorAll('.colormap').forEach(function(el) {
      el.style.display = 'none';
    });
    updateLegend(document.getElementById('col-select').value);
    map.eachLayer(function(layer) {
      if (typeof layer.eachLayer !== 'function') return;
      layer.eachLayer(function(featureLayer) {
        if (!featureLayer.feature) return;
        featureLayer.on('click', function() {
          _currentProps = featureLayer.feature.properties;
          updateInfoPanel();
        });
      });
    });
  }
  setTimeout(init, 0);
})();
